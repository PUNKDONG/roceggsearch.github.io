      <form id="lookup-form" class="lookup-form">
        <label>
          <span>身高</span>
          <input id="height" name="height" placeholder="请输入身高数值，例如 0.35" required>
        </label>
        <label>
          <span>体重</span>
          <input id="weight" name="weight" placeholder="请输入体重数值，例如 8" required>
        </label>
        <button type="submit">查询</button>
      </form>

      <section id="result" class="result hidden">
        <p id="result-meta" class="meta"></p>
        <p id="result-error" class="error hidden"></p>

          <label>

            <input id="submit-weight" name="weight" placeholder="请输入体重数值" required>
          </label>
          <label class="full-width">
            <span>名称</span>

          </label>
